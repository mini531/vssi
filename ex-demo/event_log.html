<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Event Log</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
<style>
:root{--bg:#0a0c0e;--bg2:#12141a;--card:#1a1f26;--line:#2a2f36;--card-bg:rgba(8,18,29,.15);--card-bd:rgba(173,197,255,.1);--text:#e6f0ff;--muted:#9db5d1;--muted2:#bcd1ea;--ok:#42e8ff;--warn:#ffd055;--accent:#6ee7ff}
*{box-sizing:border-box}
html{color-scheme:dark}
body{margin:0;font-family:ui-sans-serif,system-ui,Segoe UI,Apple SD Gothic Neo,Malgun Gothic,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1200px;margin:24px auto;padding:0 16px}
.hdr{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px}
.title{font-size:18px;font-weight:800;letter-spacing:.2px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--card-bd);background:var(--card-bg);color:var(--text);border-radius:0;cursor:pointer;transition:transform .12s ease,box-shadow .12s ease,background .12s ease;height:36px}
.btn:hover{background:rgba(8,18,29,.25);border-color:rgba(173,197,255,.2);box-shadow:0 2px 8px rgba(0,0,0,.25);transform:translateY(-.5px)}
.btn:active{transform:translateY(0);box-shadow:0 1px 4px rgba(0,0,0,.18) inset}
.card{background:var(--card-bg);border:1px solid var(--card-bd);border-radius:0;padding:12px}
.filters{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:12px;margin-bottom:12px}
.field{grid-column:span 3;display:flex;flex-direction:column;gap:6px}
.label{font-size:12px;color:var(--muted)}
.input{height:36px;padding:6px 10px;border:1px solid var(--card-bd);border-radius:0;background:rgba(10,22,38,.3);color:var(--text);outline:none}
.input:focus{border-color:rgba(110,231,255,.5);box-shadow:0 0 0 3px rgba(110,231,255,.12)}
.input[type="date"]{color-scheme:dark}
.input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.8);cursor:pointer}
.input[type="date"]::-webkit-datetime-edit,.input[type="date"]::-webkit-datetime-edit-fields-wrapper,.input[type="date"]::-webkit-datetime-edit-month-field,.input[type="date"]::-webkit-datetime-edit-day-field,.input[type="date"]::-webkit-datetime-edit-year-field{color:var(--text)}
.input[type="date"]::-webkit-datetime-edit-text{color:var(--muted2)}
.input.select{appearance:none;-webkit-appearance:none;-moz-appearance:none;padding-right:36px;background-color:rgba(10,22,38,.3);background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23cfe4ff' d='M7 10l5 5 5-5z'/></svg>");background-repeat:no-repeat;background-position:right 12px center;background-size:14px 14px}
.input.select::-ms-expand{display:none}
.input.select option{background:#141719;color:#e6f0ff}
.toolbar{grid-column:span 2;display:flex;align-items:flex-end;justify-content:flex-start;gap:8px;align-self:end;margin-left:8px}
.actions-right{grid-column:span 1;display:flex;align-items:flex-end;justify-content:flex-end;gap:8px;align-self:end}
#btnSearch i.bi{font-size:16px;line-height:1;display:inline-block}
.table-wrap{max-height:480px;overflow:auto;border:1px solid var(--card-bd);border-radius:0;background:rgba(12,25,41,.2)}
.tbl{width:100%;border-collapse:separate;border-spacing:0}
.tbl thead th{position:sticky;top:0;background:rgba(18,34,55,.9);backdrop-filter:blur(2px);font-weight:700;font-size:12px;color:var(--muted2);text-align:left;padding:10px 12px;border-bottom:1px solid var(--card-bd)}
.tbl tbody td{padding:8px 10px;border-bottom:1px solid rgba(173,197,255,.08);font-size:13px;line-height:1.25}
.tbl tbody tr:hover{background:rgba(173,197,255,.08)}
.badge{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:0;font-size:12px;border:1px solid rgba(173,197,255,.28);background:rgba(66,232,255,.12);color:#cfe4ff}
.meta{color:var(--muted2);font-size:12px}
.footer{margin-top:10px;display:flex;align-items:center;justify-content:space-between;color:var(--muted2);font-size:12px}
.pager{display:flex;gap:6px;justify-content:flex-end}
.pager .btn{padding:6px 10px}
.note{font-size:12px;color:var(--muted)}
:root{scrollbar-width:thin;scrollbar-color:#3a3f47 #1a1f26}
*::-webkit-scrollbar{width:6px;height:6px}
*::-webkit-scrollbar-track{background:#1a1f26;border-radius:0}
*::-webkit-scrollbar-thumb{background:#3a3f47;border-radius:0;border:none}
*::-webkit-scrollbar-thumb:hover{background:#4a5058}
@media (max-width:920px){.filters{grid-template-columns:repeat(6,minmax(0,1fr))}.field{grid-column:span 6}.toolbar{grid-column:span 3;margin-left:0}.actions-right{grid-column:span 3;justify-content:flex-start}}

</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="title">Event Log</div>
  </div>

  <div class="card">
    <div class="filters">
      <div class="field w3"><label class="label">시작일(UTC)</label><input type="date" class="input" id="startDate" /></div>
      <div class="field w3"><label class="label">종료일(UTC)</label><input type="date" class="input" id="endDate" /></div>
      <div class="field w3"><label class="label">Type</label>
        <select class="input select" id="typeSel">
          <option value="ALL">ALL</option>
          <option value="TG001">TG001 · Mode</option>
          <option value="TG002">TG002 · Battery</option>
          <option value="TG003">TG003 · GeoFence</option>
          <option value="TG004">TG004 · Link</option>
        </select>
      </div>
      <div class="toolbar">
        <button class="btn" id="btnSearch"><i class="bi bi-search"></i><span>Search</span></button>
      </div>
      <div class="actions-right">
        <button class="btn" id="btnExport"><i class="bi bi-download"></i><span>Export</span></button>
      </div>
    </div>

    <div class="table-wrap">
      <table class="tbl" id="tbl">
        <thead>
          <tr>
            <th style="width:150px">날짜(UTC)</th>
            <th style="width:120px">시간(UTC)</th>
            <th style="width:120px">코드</th>
            <th>메시지</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="footer">
      <span class="note" id="countNote"></span>
      <div class="pager">
        <button class="btn" id="prev">Prev</button>
        <button class="btn" id="next">Next</button>
      </div>
    </div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
const fmtDateUTC=ts=>{const d=new Date(ts);return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`};
const fmtKoDateUTC=ts=>{const d=new Date(ts);return `${d.getUTCFullYear()}년 ${d.getUTCMonth()+1}월 ${d.getUTCDate()}일`};
const fmtKoTimeUTC=ts=>{const d=new Date(ts);const h=String(d.getUTCHours()).padStart(2,'0');const m=String(d.getUTCMinutes()).padStart(2,'0');const s=String(d.getUTCSeconds()).padStart(2,'0');return `${h}:${m}:${s}`};
const clamp=(v,min,max)=>Math.min(Math.max(v,min),max);

const MSGS={TG001:['Mode switch HOLD→CRZ','Mode switch CRZ→APP','Mode switch APP→RTL'],TG002:['Battery health check','Battery temp high','Battery level low'],TG003:['Geo-fence warning','Geo-fence cleared','Geo-fence entering'],TG004:['Link down detected','Link restored','Latency high on link']};
function genEvents(n=180){const now=Date.now();let acc=0;const arr=[];for(let i=0;i<n;i++){const step=(i===0)?0:10+Math.floor(Math.random()*90);acc+=step;const ts=now-acc*1000;const codes=Object.keys(MSGS);const code=codes[Math.floor(Math.random()*codes.length)];const msg=MSGS[code][Math.floor(Math.random()*MSGS[code].length)];arr.push({ts,code,msg});}return arr.sort((a,b)=>b.ts-a.ts);}
let ALL=genEvents();

const PAGE=10; let page=1; let VIEW=[...ALL];
function render(){const start=(page-1)*PAGE,end=page*PAGE;const rows=VIEW.slice(start,end).map(e=>`<tr><td class="meta">${fmtKoDateUTC(e.ts)}</td><td class="meta">${fmtKoTimeUTC(e.ts)} UTC</td><td><span class="badge">${e.code}</span></td><td>${e.msg}</td></tr>`).join('');$('#tbody').innerHTML=rows||`<tr><td colspan="4" class="meta">No results</td></tr>`;$('#countNote').textContent=`${VIEW.length.toLocaleString()} rows · page ${page}/${Math.max(1,Math.ceil(VIEW.length/PAGE))}`;}
function applyFilter(){const t=$('#typeSel').value;const sd=$('#startDate').value?Date.parse($('#startDate').value+'T00:00:00Z'):null;const ed=$('#endDate').value?Date.parse($('#endDate').value+'T23:59:59Z'):null;VIEW=ALL.filter(e=>{if(t!=='ALL'&&e.code!==t) return false; if(sd&&e.ts<sd) return false; if(ed&&e.ts>ed) return false; return true;}).sort((a,b)=>b.ts-a.ts);page=1;render();}
$('#btnSearch').addEventListener('click',applyFilter);
$('#typeSel').addEventListener('change',applyFilter);
$('#prev').addEventListener('click',()=>{page=clamp(page-1,1,Math.max(1,Math.ceil(VIEW.length/PAGE)));render()});
$('#next').addEventListener('click',()=>{page=clamp(page+1,1,Math.max(1,Math.ceil(VIEW.length/PAGE)));render()});
document.addEventListener('keydown',e=>{if(e.key==='Enter') applyFilter()});
(function init(){const today=fmtDateUTC(Date.now());$('#startDate').value=today;$('#endDate').value=today;applyFilter();})();
$('#btnExport').addEventListener('click',()=>{const head='date,time,code,message\n';const csv=head+VIEW.map(e=>`${fmtDateUTC(e.ts)},${fmtKoTimeUTC(e.ts)},${e.code},${e.msg}`).join('\n');const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='event_log.csv';a.click();URL.revokeObjectURL(a.href);});
</script>
</body>
</html>
