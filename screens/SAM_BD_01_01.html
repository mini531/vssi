<!DOCTYPE html>
<html lang="ko" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMS - Notice Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="dashboard-body app-screen-height" data-system-acronym="SAMS" data-page-title="공지사항 관리">
    <!-- Header (Fixed Top) -->
    <div data-include="../components/header.html"></div>

    <!-- Main Flex Container (Sidebar + Content) -->
    <div class="dashboard-main-flex">

        <!-- Sidebar -->
        <div data-include="../components/sidebar.html"></div>

        <!-- Main Content (Pushed by Sidebar) -->
        <main class="dashboard-main" id="main-content">

            <!-- Content Scroll Area -->
            <div class="dashboard-content dashboard-content-full custom-scrollbar">
                <div class="dashboard-container dashboard-container-full">

                    <!-- Split Pane Container -->
                    <div class="split-container">

                        <!-- Left Pane: Notice List -->
                        <div class="split-pane-left">
                            <div class="pane-header">
                                <div class="search-panel-title-group">
                                    <i data-lucide="megaphone" class="status-card-icon text-success"></i>
                                    <span class="search-panel-title">공지사항 목록</span>
                                </div>
                                <button id="btn-reg-start" class="btn-sm btn-primary" onclick="initRegistrationMode()">
                                    <i data-lucide="plus" class="trend-icon"></i> 공지사항 등록
                                </button>
                            </div>


                            <div class="pane-content custom-scrollbar flex-1 flex flex-col">
                                <!-- Search Filter -->
                                <div class="search-panel flex-none mb-4">
                                    <div class="search-panel-header" onclick="toggleNoticeFilter()">
                                        <div class="search-panel-title-group">
                                            <i data-lucide="filter" class="status-card-icon text-success"></i>
                                            <span class="search-panel-title">검색 필터</span>
                                        </div>
                                        <i data-lucide="chevron-down" id="notice-filter-chevron"
                                            class="filter-chevron"></i>
                                    </div>

                                    <div id="notice-filter-content" class="search-panel-content hidden">
                                        <div class="filter-panel-inner">
                                            <div class="filter-grid">
                                                <div class="filter-grid-wide">
                                                    <label class="filter-label">검색어</label>
                                                    <div class="filter-date-range">
                                                        <select id="filter-type" class="filter-select">
                                                            <option value="all">전체</option>
                                                            <option value="title">제목</option>
                                                            <option value="content">내용</option>
                                                            <option value="registrant">등록자</option>
                                                        </select>
                                                        <input type="text" id="filter-keyword" class="filter-input"
                                                            placeholder="검색어 입력"
                                                            onkeyup="if(event.key === 'Enter') applyNoticeFilter()">
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="filter-actions">
                                            <button class="filter-btn-common filter-btn-reset"
                                                onclick="resetNoticeFilter()">
                                                <i data-lucide="rotate-ccw" class="trend-icon"></i> 초기화
                                            </button>
                                            <button class="filter-btn-common filter-btn-search"
                                                onclick="applyNoticeFilter()">
                                                <i data-lucide="search" class="trend-icon"></i> 조회
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div class="table-container flex-1">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                <th>제목</th>
                                                <th class="text-center">등록 일시</th>
                                                <th class="text-center">등록자</th>
                                            </tr>
                                        </thead>
                                        <tbody id="notice-list-body">
                                            <!-- JS Rendered -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <!-- Pagination Footer -->
                            <div class="table-footer">
                                <span class="pagination-info" id="total-count">총 0 건</span>
                                <div class="pagination-controls">
                                    <button class="page-btn active">1</button>
                                    <button class="page-btn">2</button>
                                    <button class="page-btn">3</button>
                                    <button class="page-btn pc-only">4</button>
                                    <button class="page-btn pc-only">5</button>
                                    <button class="page-btn"><i data-lucide="chevron-right"
                                            class="pagination-icon"></i></button>
                                    <select class="pagination-select pagination-select-margin">
                                        <option>20개씩 보기</option>
                                        <option>50개씩 보기</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Right Pane: Notice Detail -->
                        <div class="split-pane-right" id="detail-pane">
                            <!-- Empty State -->
                            <div id="empty-state" class="empty-state">
                                <i data-lucide="file-text" class="empty-state-icon"></i>
                                <p class="empty-state-text">좌측 목록에서 공지사항을 선택해 주세요.</p>
                            </div>

                            <!-- Detail Content (Hidden initially) -->
                            <div id="detail-content" class="hidden h-full flex flex-col">
                                <div class="pane-header">
                                    <!-- Right Pane Header Group (Target for hiding in Reg Mode) -->
                                    <div id="right-pane-header">
                                        <div class="search-panel-title-group">
                                            <i data-lucide="file-check" class="status-card-icon text-success"></i>
                                            <span id="right-pane-title" class="search-panel-title">공지사항 정보</span>
                                        </div>
                                    </div>

                                    <!-- Registration Mode Header (Hidden by default) -->
                                    <div id="reg-header-group" class="hidden search-panel-title-group">
                                        <i data-lucide="file-plus" class="status-card-icon text-success"></i>
                                        <span class="search-panel-title">공지사항 등록</span>
                                    </div>

                                    <!-- Buttons Group -->
                                    <div class="pane-header-right">
                                        <!-- View Mode Buttons -->
                                        <div id="view-mode-buttons" class="action-btn-group">
                                            <button class="btn-sm btn-secondary mobile-list-btn"
                                                onclick="closeDetailPane()">
                                                <i data-lucide="list" class="trend-icon"></i> 목록
                                            </button>
                                            <button class="btn-sm btn-primary" onclick="enterEditMode()">
                                                <i data-lucide="edit-3" class="trend-icon"></i> 수정
                                            </button>
                                            <button class="btn-sm btn-danger" onclick="showDeleteWarning()">
                                                <i data-lucide="trash-2" class="trend-icon"></i> 삭제
                                            </button>
                                        </div>
                                        <!-- Edit Mode Buttons -->
                                        <div id="edit-mode-buttons" class="action-btn-group hidden">
                                            <button class="btn-sm btn-secondary" onclick="cancelEdit()">
                                                <i data-lucide="x" class="trend-icon"></i> 취소
                                            </button>
                                            <button class="btn-sm btn-primary" onclick="saveChanges()">
                                                <i data-lucide="save" class="trend-icon"></i> 저장
                                            </button>
                                        </div>
                                        <!-- Registration Mode Buttons -->
                                        <div id="reg-mode-buttons" class="action-btn-group hidden">
                                            <button class="btn-sm btn-secondary mobile-list-btn"
                                                onclick="closeDetailPane()">
                                                <i data-lucide="list" class="trend-icon"></i> 목록
                                            </button>
                                            <button class="btn-sm btn-secondary" onclick="cancelRegistration()">
                                                <i data-lucide="x" class="trend-icon"></i> 취소
                                            </button>
                                            <button class="btn-sm btn-primary" onclick="processRegistration()">
                                                <i data-lucide="save" class="trend-icon"></i> 저장
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <!-- Form Content -->
                                <div class="pane-content custom-scrollbar flex-1">
                                    <div id="notice-form" class="registration-form-panel">
                                        <div class="grid grid-cols-1 gap-4">
                                            <!-- Title -->
                                            <div>
                                                <label class="form-label">제목 <span id="req-title"
                                                        class="text-error required-mark">*</span></label>
                                                <input type="text" id="notice-title" class="form-input"
                                                    placeholder="제목을 입력하세요" disabled
                                                    oninput="resetError('notice-title')">
                                                <div id="error-notice-title" class="form-error"></div>
                                            </div>

                                            <!-- Content -->
                                            <div>
                                                <label class="form-label">내용 <span id="req-content"
                                                        class="text-error required-mark">*</span></label>
                                                <!-- Edit/Reg Mode -->
                                                <textarea id="notice-content-edit" class="form-input hidden"
                                                    placeholder="내용을 입력하세요"
                                                    oninput="resetError('notice-content-edit')"></textarea>

                                                <!-- View Mode -->
                                                <!-- View Mode -->
                                                <div id="notice-content-view" class="data-value">
                                                </div>

                                                <div id="error-notice-content-edit" class="form-error"></div>
                                            </div>

                                            <!-- Attachments -->
                                            <div id="notice-attachments-section">
                                                <label class="form-label">첨부파일</label>
                                                <!-- File Input Area (Edit Mode) -->
                                                <div id="file-upload-area" class="hidden mb-2">
                                                    <div class="flex items-center gap-2">
                                                        <label for="file-input" class="btn-sm btn-secondary">
                                                            <i data-lucide="upload" class="w-4 h-4 mr-1"></i> 파일 선택
                                                        </label>
                                                        <input type="file" id="file-input" class="hidden" multiple
                                                            onchange="handleFileSelect(event)">
                                                        <span class="text-xs text-gray-400">여러 파일을 선택할 수 있습니다.</span>
                                                    </div>
                                                </div>

                                                <!-- File List -->
                                                <div id="file-list" class="file-list-container space-y-2">
                                                    <!-- JS Generated -->
                                                </div>
                                            </div>

                                            <!-- Dates & Registrant (View Only) -->
                                            <div id="notice-dates-section" class="grid grid-cols-3 gap-4 hidden">
                                                <div>
                                                    <label class="form-label">등록자</label>
                                                    <input type="text" id="notice-registrant" class="form-input"
                                                        disabled>
                                                </div>
                                                <div>
                                                    <label class="form-label">등록 일시</label>
                                                    <input type="text" id="notice-reg-date" class="form-input" disabled>
                                                </div>
                                                <div>
                                                    <label class="form-label">수정 일시</label>
                                                    <input type="text" id="notice-mod-date" class="form-input" disabled>
                                                </div>
                                            </div>

                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div> <!-- End of split-container -->
                </div>
            </div>
        </main>
    </div>

    <!-- System Switcher Modal -->
    <div data-include="../components/system-switcher.html"></div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-dialog">
            <div class="modal-icon info">
                <i data-lucide="help-circle" width="64" height="64" class="text-icon-info"></i>
            </div>
            <h3 class="modal-title">공지사항 등록</h3>
            <p class="modal-desc">공지사항을 등록하시겠습니까?</p>
            <div class="modal-btn-group">
                <button onclick="closeConfirmModal()" class="btn-flex btn-modal-secondary">취소</button>
                <button onclick="confirmSaveAction()" class="btn-flex btn-modal-primary">확인</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div id="delete-confirm-modal" class="modal-overlay">
        <div class="modal-dialog">
            <div class="modal-icon warning">
                <i data-lucide="alert-triangle" width="64" height="64" class="text-icon-warning"></i>
            </div>
            <h3 class="modal-title">공지사항 삭제</h3>
            <p class="modal-desc">공지사항을 삭제하시겠습니까?<br>삭제 후 복구할 수 없습니다.</p>
            <div class="modal-btn-group">
                <button onclick="closeDeleteConfirm()" class="btn-flex btn-modal-secondary">취소</button>
                <button onclick="confirmDeleteAction()" class="btn-flex btn-modal-warning">삭제</button>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="modal-overlay">
        <div class="modal-dialog">
            <div class="modal-icon success">
                <i data-lucide="check-circle-2" width="64" height="64" class="text-icon-success"></i>
            </div>
            <h3 class="modal-title" id="success-modal-title">완료</h3>
            <p id="success-message" class="modal-desc">작업이 완료되었습니다.</p>
            <div class="modal-btn-group">
                <button onclick="closeSuccessModal()" class="btn-modal-success">확인</button>
            </div>
        </div>
    </div>

    <script src="../js/include.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/SAM_BD_01_01.js"></script>
</body>

</html>
