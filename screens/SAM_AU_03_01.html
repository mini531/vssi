<!DOCTYPE html>
<html lang="ko" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMS - Security Policy Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="dashboard-body app-screen-height" data-system-acronym="SAMS" data-page-title="보안 정책 설정">
    <!-- Header (Fixed Top) -->
    <div data-include="../components/header.html"></div>

    <!-- Main Flex Container (Sidebar + Content) -->
    <div class="dashboard-main-flex">

        <!-- Sidebar -->
        <div data-include="../components/sidebar.html"></div>

        <!-- Main Content -->
        <main class="dashboard-main" id="main-content">

            <!-- Content Scroll Area -->
            <div class="dashboard-content dashboard-content-full custom-scrollbar">
                <div class="dashboard-container dashboard-container-full">

                    <!-- Main Card (Single Pane Layout like SAM_SY_01_01) -->
                    <div class="glass-panel h-full flex flex-col">

                        <!-- Pane Header: Title + Registration Action -->
                        <div class="pane-header">
                            <div class="search-panel-title-group">
                                <i data-lucide="shield-check" class="status-card-icon text-success"></i>
                                <span class="search-panel-title">접근 가능 IP</span>
                            </div>
                            <button class="btn-sm btn-primary" onclick="openRegistrationModal(event)">
                                <i data-lucide="plus" class="trend-icon"></i> 접근 IP 등록
                            </button>
                        </div>

                        <!-- Pane Content -->
                        <div class="pane-content custom-scrollbar flex-1 flex flex-col">

                            <!-- Search Filter -->
                            <div class="search-panel flex-none mb-4">
                                <div class="search-panel-header" onclick="toggleFilter()">
                                    <div class="search-panel-title-group">
                                        <i data-lucide="filter" class="status-card-icon text-success"></i>
                                        <span class="search-panel-title">검색 필터</span>
                                    </div>
                                    <i data-lucide="chevron-up" id="filter-chevron"
                                        class="filter-chevron rotate-180"></i>
                                </div>

                                <div id="filter-content" class="search-panel-content hidden">
                                    <div class="filter-panel-inner">
                                        <div class="filter-grid">
                                            <div>
                                                <label class="filter-label">IP 주소</label>
                                                <input type="text" id="filter-ip" placeholder="IP 주소"
                                                    class="filter-input">
                                            </div>
                                            <div>
                                                <label class="filter-label">설명</label>
                                                <input type="text" id="filter-desc" placeholder="설명"
                                                    class="filter-input">
                                            </div>
                                            <div>
                                                <label class="filter-label">등록자</label>
                                                <input type="text" id="filter-user" placeholder="등록자 이름"
                                                    class="filter-input">
                                            </div>
                                        </div>

                                        <div class="filter-actions">
                                            <button class="filter-btn-common filter-btn-reset" onclick="resetFilter()">
                                                <i data-lucide="rotate-ccw" class="trend-icon"></i> 초기화
                                            </button>
                                            <button class="filter-btn-common filter-btn-search" onclick="applyFilter()">
                                                <i data-lucide="search" class="trend-icon"></i> 조회
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Table Area -->
                            <div class="table-container flex-1">
                                <table class="data-table">
                                    <thead>
                                        <tr>
                                            <th>IP 주소</th>
                                            <th>설명</th>
                                            <th>등록자</th>
                                            <th class="text-center">등록 일시</th>
                                            <th class="text-center w-24">관리</th>
                                        </tr>
                                    </thead>
                                    <tbody id="ip-list-body" class="data-table-body">
                                        <!-- JS Rendered -->
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Footer (Shared Pattern) -->
                        <div class="table-footer flex-none border-t border-slate-700/50">
                            <span class="pagination-info" id="total-count">총 0 건</span>
                            <div class="pagination-controls">
                                <button class="page-btn active">1</button>
                                <button class="page-btn">2</button>
                                <button class="page-btn">3</button>
                                <button class="page-btn pc-only">4</button>
                                <button class="page-btn pc-only">5</button>
                                <button class="page-btn"><i data-lucide="chevron-right"
                                        class="pagination-icon"></i></button>
                                <select class="pagination-select pagination-select-margin">
                                    <option>20개씩 보기</option>
                                    <option>50개씩 보기</option>
                                </select>
                            </div>
                        </div>

                    </div> <!-- End of glass-panel -->

                </div>
            </div>
        </main>
    </div>

    <!-- Registration Modal -->
    <div id="registration-modal" class="modal-overlay">
        <div class="modal-dialog">
            <div class="modal-header">
                <h3 class="modal-title-left">접근 IP 등록</h3>
                <i data-lucide="x" class="close-icon" onclick="closeRegistrationModal()"></i>
            </div>
            <div class="modal-content">
                <div class="registration-form-panel">
                    <div class="mb-4">
                        <label class="form-label">접근 IP 주소 (또는 대역) <span
                                class="text-error required-mark">*</span></label>
                        <input type="text" id="reg-ip" class="form-input"
                            placeholder="예: 192.168.1.100 또는 192.168.1.* (또는 /24)" oninput="resetError('reg-ip')">
                        <div id="error-reg-ip" class="form-error"></div>
                    </div>
                    <div>
                        <label class="form-label">설명</label>
                        <textarea id="reg-desc" class="form-input min-h-[80px] py-2"
                            placeholder="용도 및 비고 사항을 입력해 주세요."></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-btn-group">
                <button onclick="closeRegistrationModal()" class="btn-secondary">취소</button>
                <button onclick="confirmRegistration()" class="btn-primary">저장</button>
            </div>
        </div>
    </div>

    <!-- Confirm Save Modal -->
    <div id="confirm-save-modal" class="modal-overlay">
        <div class="modal-dialog">
            <div class="modal-icon info">
                <i data-lucide="help-circle" width="64" height="64" class="text-icon-info"></i>
            </div>
            <h3 class="modal-title">IP 저장 확인</h3>
            <p class="modal-desc">입력하신 IP 정보를 저장하시겠습니까?</p>
            <div class="modal-btn-group">
                <button onclick="closeConfirmSaveModal()" class="btn-flex btn-modal-secondary">취소</button>
                <button onclick="processRegistration()" class="btn-flex btn-modal-primary">확인</button>
            </div>
        </div>
    </div>

    <!-- Standardized Delete Confirm Modal (Copy from SAM_US_01_01) -->
    <div id="delete-confirm-modal" class="modal-overlay">
        <div class="modal-dialog">
            <div class="modal-icon info">
                <i data-lucide="help-circle" width="64" height="64" class="text-icon-info"></i>
            </div>
            <h3 class="modal-title">접근 IP 삭제</h3>
            <p class="modal-desc">선택한 IP 정보를 삭제하시겠습니까?<br>삭제 후 복구할 수 없습니다.</p>
            <div class="modal-btn-group">
                <button onclick="closeDeleteConfirm()" class="btn-flex btn-modal-secondary">취소</button>
                <button onclick="confirmDeleteAction()" class="btn-flex btn-modal-primary">확인</button>
            </div>
        </div>
    </div>

    <!-- Standardized Success Modal -->
    <div id="success-modal" class="modal-overlay">
        <div class="modal-dialog">
            <div class="modal-icon success">
                <i data-lucide="check-circle-2" width="64" height="64" class="text-icon-success"></i>
            </div>
            <h3 class="modal-title" id="success-modal-title">저장 완료</h3>
            <p id="success-message" class="modal-desc">IP 정보가 저장되었습니다.</p>
            <div class="modal-btn-group">
                <button onclick="closeSuccessModal()" class="btn-modal-success">확인</button>
            </div>
        </div>
    </div>

    <!-- System Switcher -->
    <div data-include="../components/system-switcher.html"></div>

    <script src="../js/include.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/SAM_AU_03_01.js"></script>
</body>

</html>
