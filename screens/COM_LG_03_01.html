<!DOCTYPE html>
<html lang="ko" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSSI - Password Reset Request</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="auth-body auth-page-scroll app-bg scrollbar-hide">
    <div class="auth-scroll-view">

        <!-- Upper Branding Section -->
        <div class="brand-container">
            <h1 class="brand-text">VSSI</h1>
            <p class="brand-sub">Vertiport Standards and Safety Infrastructure</p>
            <p class="brand-desc">K-UAM 상용화를 위한 버티포트 표준 및 통합운용 플랫폼</p>
        </div>

        <!-- Password Reset Card -->
        <div class="glass-card-auth auth-card-container">

            <div class="auth-card-body">
                <!-- Header -->
                <div class="auth-card-header">
                    <h2 class="auth-card-title">비밀번호 초기화 요청</h2>
                </div>

                <!-- Form Fields -->
                <div class="spacing-y-6">

                    <!-- ID -->
                    <div>
                        <label class="form-label">아이디 <span>*</span></label>
                        <input type="text" id="id" placeholder="아이디를 입력해 주세요." class="form-input"
                            oninput="resetError('id')">
                        <div id="error-id" class="form-error"></div>
                    </div>

                    <!-- Name -->
                    <div>
                        <label class="form-label">이름 <span>*</span></label>
                        <input type="text" id="name" placeholder="이름을 입력해 주세요." class="form-input"
                            oninput="resetError('name')">
                        <div id="error-name" class="form-error"></div>
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="form-label">이메일 <span>*</span></label>
                        <input type="email" id="email" placeholder="이메일을 입력해 주세요." class="form-input"
                            oninput="resetError('email')">
                        <div id="error-email" class="form-error"></div>
                    </div>

                    <!-- Buttons -->
                    <div class="pt-standard spacing-y-3">
                        <button onclick="handleRequest()" class="btn-primary">
                            초기화 요청
                        </button>
                        <a href="COM_LG_01_01.html" class="btn-secondary">취소</a>
                    </div>
                </div>
            </div>

            <!-- Footer Guidance (Semantic structure based on COM_LG_01_01) -->
            <div class="auth-footer">
                <div class="auth-help-container">
                    <div class="auth-help-icon-wrapper">
                        <i data-lucide="help-circle"></i>
                    </div>
                    <div>
                        <h3 class="auth-help-title">비밀번호 초기화 요청 안내</h3>
                        <div class="auth-help-desc">
                            <li>입력하신 정보가 일치하면 비밀번호 재설정 메일을 보내드립니다.</li>
                            <li>입력하신 이메일 주소로 발송된 링크를 통해 비밀번호를 안전하게 변경하실 수 있습니다.</li>
                            <li>메일이 오지 않을 경우, 스팸 메일함을 확인해 주세요.</li>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- Background Elements -->
    <div class="auth-bg-decoration">
        <div class="auth-bg-blob-blue"></div>
        <div class="auth-bg-blob-teal"></div>
    </div>

    <!-- Modal Component -->
    <div id="modal-backdrop" class="modal-overlay">
        <div class="modal-dialog">
            <!-- Icon -->
            <div id="modal-icon" class="modal-icon"></div>

            <h3 id="modal-title" class="modal-title"></h3>
            <p id="modal-desc" class="modal-desc"></p>

            <!-- Buttons -->
            <div id="modal-buttons" class="modal-btn-group"></div>
        </div>
    </div>

    <script>
        // Init Icons
        lucide.createIcons();

        // Helpers
        const getVal = (id) => document.getElementById(id).value.trim();
        const setErr = (id, msg) => {
            const errDiv = document.getElementById(`error-${id}`);
            if (errDiv) errDiv.innerText = msg;
            const input = document.getElementById(id);
            if (input) input.classList.add('error');
        };
        const resetError = (id) => {
            const errDiv = document.getElementById(`error-${id}`);
            if (errDiv) errDiv.innerText = '';
            const input = document.getElementById(id);
            if (input) input.classList.remove('error');
        };

        // Modal Logic
        function showModal(type, callback) {
            const backdrop = document.getElementById('modal-backdrop');
            const iconEl = document.getElementById('modal-icon');
            const titleEl = document.getElementById('modal-title');
            const descEl = document.getElementById('modal-desc');
            const btnsEl = document.getElementById('modal-buttons');

            let content = {};

            if (type === 'warning') {
                content = {
                    icon: '<div class="modal-icon warning"><i data-lucide="alert-triangle" width="64" height="64" class="text-icon-warning"></i></div>',
                    title: '정보 확인',
                    desc: '입력하신 정보와 일치하는 계정을 찾을 수 없습니다.',
                    btns: `<button onclick="closeModal()" class="btn-modal-warning">확인</button>`
                };
            } else if (type === 'confirm') {
                content = {
                    icon: '<div class="modal-icon info"><i data-lucide="help-circle" width="64" height="64" class="text-icon-info"></i></div>',
                    title: '비밀번호 초기화',
                    desc: '입력하신 이메일 주소로 초기화 메일을 발송하시겠습니까?',
                    btns: `
                        <button onclick="closeModal()" class="btn-flex btn-modal-secondary">취소</button>
                        <button onclick="confirmAction()" class="btn-flex btn-modal-primary">확인</button>
                    `
                };
                window.confirmAction = () => {
                    closeModal();
                    if (callback) callback();
                };
            } else if (type === 'success') {
                content = {
                    icon: '<div class="modal-icon success"><i data-lucide="check-circle" width="64" height="64" class="text-icon-success"></i></div>',
                    title: '요청 완료',
                    desc: '입력하신 이메일로 비밀번호 재설정 메일을 보냈습니다.',
                    btns: `<button onclick="goToLogin()" class="btn-modal-success">확인</button>`
                };
            }

            iconEl.innerHTML = content.icon;
            titleEl.innerText = content.title;
            descEl.innerText = content.desc;
            btnsEl.innerHTML = content.btns;

            backdrop.classList.add('active');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('modal-backdrop').classList.remove('active');
        }

        function goToLogin() {
            window.location.href = 'COM_LG_01_01.html';
        }

        // Action Logic
        function handleRequest() {
            const id = getVal('id');
            const name = getVal('name');
            const email = getVal('email');

            let hasError = false;

            if (!id) { setErr('id', '아이디를 입력해 주세요.'); hasError = true; }
            if (!name) { setErr('name', '이름을 입력해 주세요.'); hasError = true; }
            if (!email) { setErr('email', '이메일을 입력해 주세요.'); hasError = true; }

            if (hasError) return;

            // Scenario test: if ID is 'error', show Warning modal
            if (id === 'error') {
                showModal('warning');
                return;
            }

            showModal('confirm', () => {
                setTimeout(() => {
                    showModal('success');
                }, 300);
            });
        }
    </script>
</body>

</html>
