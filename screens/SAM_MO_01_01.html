        <div class="modal-dialog modal-wide">
            <div class="modal-header">

                <i data-lucide="x" class="close-icon" onclick="closeMonitoringModal()"></i>
            </div>

            <!-- Server Monitoring Content -->
            <div class="modal-content" id="modal-view-server">
                <div class="flex flex-col">
                    <!-- Head Summary -->
                    <div class="modal-summary-panel">
                        <!-- Type -->
                        <div class="summary-item">
                            <h4 class="modal-section-title mb-0">구분</h4>

                        </div>
                        <!-- Name -->

                        </div>
                        <!-- Status -->

                            <h4 class="modal-section-title mb-0">상태</h4>
                            <div class="flex items-center">
                                <span class="badge badge-success" id="server-modal-status">정상</span>
                            </div>
                        </div>
                    </div>

                    <!-- CPU Section -->
                    <div class="mb-sm">
                        <div class="section-header">
                            <h4 class="modal-section-title">CPU 이용률</h4>
                            <span class="text-value-sub">100%</span>
                        </div>
                        <div class="monitoring-chart-container">
                            <canvas id="chart-cpu" class="w-full h-full block"></canvas>
                            <div class="chart-grid-overlay"></div>
                        </div>
                        <div class="monitoring-chart-footer">
                            <span>60초</span>
                            <span id="val-cpu-current">1</span>
                        </div>
                    </div>

                    <!-- Memory Section -->
                    <!-- Memory Section -->
                    <div class="mb-sm">
                        <div class="section-header">

                        </div>
                        <div class="monitoring-chart-container">

                            <div class="chart-grid-overlay"></div>
                        </div>
                        <div class="monitoring-chart-footer">

                        </div>
                    </div>
