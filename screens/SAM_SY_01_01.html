<!DOCTYPE html>
<html lang="ko" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMS - Code Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="dashboard-body app-screen-height" data-system-acronym="SAMS" data-page-title="코드 관리">
    <!-- Header (Fixed Top) -->
    <div data-include="../components/header.html"></div>

    <!-- Main Flex Container (Sidebar + Content) -->
    <div class="dashboard-main-flex">

        <!-- Sidebar -->
        <div data-include="../components/sidebar.html"></div>

        <!-- Main Content (Pushed by Sidebar) -->
        <main class="dashboard-main" id="main-content">

            <!-- Content Scroll Area -->
            <div class="dashboard-content dashboard-content-full custom-scrollbar">
                <div class="dashboard-container dashboard-container-full">

                    <!-- Split Pane Container -->
                    <div class="split-container">

                        <!-- Left Pane: Code Group List -->
                        <div class="split-pane-left">
                            <div class="pane-header">
                                <div class="search-panel-title-group">
                                    <i data-lucide="folder-tree" class="status-card-icon text-success"></i>
                                    <span class="search-panel-title">코드 그룹 목록</span>
                                </div>
                                <div class="action-btn-group">
                                    <button class="btn-sm btn-primary" onclick="initRegistrationMode('group')">
                                        <i data-lucide="plus" class="trend-icon"></i> 코드 그룹 등록
                                    </button>
                                </div>
                            </div>

                            <div class="pane-content custom-scrollbar flex-1 flex flex-col">
                                <!-- Search Filter -->
                                <div class="search-panel flex-none mb-4">
                                    <div class="search-panel-header" onclick="toggleFilter()">
                                        <div class="search-panel-title-group">
                                            <i data-lucide="filter" class="status-card-icon text-success"></i>
                                            <span class="search-panel-title">검색 필터</span>
                                        </div>
                                        <i data-lucide="chevron-down" id="filter-chevron" class="filter-chevron"></i>
                                    </div>

                                    <div id="filter-content" class="search-panel-content hidden">
                                        <div class="filter-panel-inner">
                                            <div class="filter-grid">
                                                <div>
                                                    <label class="filter-label">코드 그룹 ID</label>
                                                    <input type="text" id="filter-group-id" placeholder="코드 그룹 ID"
                                                        class="filter-input"
                                                        onkeyup="if(event.key==='Enter') applyGroupFilter()">
                                                </div>
                                                <div>
                                                    <label class="filter-label">코드 그룹 이름</label>
                                                    <input type="text" id="filter-group-name" placeholder="코드 그룹 이름"
                                                        class="filter-input"
                                                        onkeyup="if(event.key==='Enter') applyGroupFilter()">
                                                </div>
                                                <div>
                                                    <label class="filter-label">사용 여부</label>
                                                    <select id="filter-group-status" class="filter-select">
                                                        <option value="all">전체</option>
                                                        <option value="사용">사용</option>
                                                        <option value="미사용">미사용</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="filter-actions">
                                            <button class="filter-btn-common filter-btn-reset"
                                                onclick="resetGroupFilter()">
                                                <i data-lucide="rotate-ccw" class="trend-icon"></i> 초기화
                                            </button>
                                            <button class="filter-btn-common filter-btn-search"
                                                onclick="applyGroupFilter()">
                                                <i data-lucide="search" class="trend-icon"></i> 조회
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div class="table-container flex-1">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                <th>코드 그룹 ID</th>
                                                <th>코드 그룹 이름</th>
                                                <th class="text-center">사용 여부</th>
                                                <th class="text-center">최근 갱신 일시</th>
                                            </tr>
                                        </thead>
                                        <tbody id="group-list-body">
                                            <!-- JS Rendered -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <!-- Pagination Footer -->
                            <div class="table-footer">
                                <span class="pagination-info" id="group-total-count">총 0 건</span>
                                <div class="pagination-controls">
                                    <button class="page-btn active">1</button>
                                    <button class="page-btn">2</button>
                                    <button class="page-btn">3</button>
                                    <button class="page-btn pc-only">4</button>
                                    <button class="page-btn pc-only">5</button>
                                    <button class="page-btn"><i data-lucide="chevron-right"
                                            class="pagination-icon"></i></button>
                                    <select class="pagination-select pagination-select-margin">
                                        <option>20개씩 보기</option>
                                        <option>50개씩 보기</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Right Pane: Code List / Registration Form -->
                        <div class="split-pane-right" id="detail-pane">
                            <!-- Empty State -->
                            <div id="empty-state" class="empty-state">
                                <i data-lucide="list-tree" class="empty-state-icon"></i>
                                <p class="empty-state-text">좌측 목록에서 코드 그룹을 선택하거나<br>새로운 코드 그룹을 등록해 주세요.</p>
                            </div>

                            <!-- Detail Content -->
                            <div id="detail-content" class="hidden h-full flex flex-col">
                                <div class="pane-header">
                                    <!-- View Mode Header -->
                                    <div id="view-header-group">
                                        <div class="search-panel-title-group">
                                            <i data-lucide="hash" class="status-card-icon text-success"></i>
                                            <span class="search-panel-title">코드 그룹 정보 - <span id="selected-group-name"
                                                    class="text-success"></span></span>
                                        </div>
                                    </div>

                                    <!-- Reg Mode Header (Code) -->
                                    <div id="reg-header-code" class="hidden search-panel-title-group">
                                        <i data-lucide="plus-square" class="status-card-icon text-success"></i>
                                        <span class="search-panel-title">코드 등록 - <span id="reg-code-parent-name"
                                                class="text-success"></span></span>
                                    </div>

                                    <!-- Edit Mode Header (Code) -->
                                    <div id="edit-header-code" class="hidden search-panel-title-group">
                                        <i data-lucide="edit" class="status-card-icon text-success"></i>
                                        <span class="search-panel-title">코드 수정 - <span id="edit-code-parent-name"
                                                class="text-success"></span></span>
                                    </div>

                                    <!-- Reg Mode Header (Group) -->
                                    <div id="reg-header-group" class="hidden search-panel-title-group">
                                        <i data-lucide="folder-plus" class="status-card-icon text-success"></i>
                                        <span class="search-panel-title">코드 그룹 등록</span>
                                    </div>

                                    <!-- Edit Mode Header (Group) -->
                                    <div id="edit-header-group" class="hidden search-panel-title-group">
                                        <i data-lucide="edit-3" class="status-card-icon text-success"></i>
                                        <span class="search-panel-title">코드 그룹 수정</span>
                                    </div>

                                    <div class="pane-header-right pr-2">
                                        <!-- View Mode: Group Management Buttons -->
                                        <div id="view-mode-buttons" class="action-btn-group">
                                            <button class="btn-sm btn-secondary"
                                                onclick="editGroupInline(selectedGroup.id)">
                                                <i data-lucide="edit-3" class="trend-icon"></i> 수정
                                            </button>
                                            <button class="btn-sm btn-danger" onclick="deleteGroup(selectedGroup.id)">
                                                <i data-lucide="trash-2" class="trend-icon"></i> 삭제
                                            </button>
                                        </div>

                                        <!-- Reg Mode Buttons -->
                                        <div id="reg-mode-buttons" class="action-btn-group hidden">
                                            <button class="btn-sm btn-secondary" onclick="cancelRegistration()">
                                                <i data-lucide="x" class="trend-icon"></i> 취소
                                            </button>
                                            <button class="btn-sm btn-primary hidden"
                                                onclick="saveRegistration('group')" id="btn-save-group">
                                                <i data-lucide="save" class="trend-icon"></i> 저장
                                            </button>
                                            <button class="btn-sm btn-primary hidden" onclick="saveRegistration('code')"
                                                id="btn-save-code">
                                                <i data-lucide="save" class="trend-icon"></i> 저장
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div class="pane-content custom-scrollbar flex-1 flex flex-col">
                                    <!-- Group Info Panel (Read-only Detail) -->
                                    <div id="group-info-view" class="mb-4">
                                        <div class="grid grid-cols-3 gap-4">
                                            <div>
                                                <label class="form-label">코드 그룹 ID</label>
                                                <input type="text" id="info-group-id" class="form-input" disabled>
                                            </div>
                                            <div>
                                                <label class="form-label">코드 그룹 이름</label>
                                                <input type="text" id="info-group-name" class="form-input" disabled>
                                            </div>
                                            <div>
                                                <label class="form-label">사용 여부</label>
                                                <input type="text" id="info-group-status" class="form-input" disabled>
                                            </div>
                                            <div class="col-span-3">
                                                <label class="form-label">설명</label>
                                                <input type="text" id="info-group-desc" class="form-input" disabled>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- View Mode: Code Table -->
                                    <div id="code-table-view" class="flex-1 flex flex-col">
                                        <div class="section-header items-center justify-between mb-2">
                                            <h4 class="modal-section-title mb-0">코드 목록</h4>
                                            <div class="flex gap-2">
                                                <button class="btn-xs btn-primary"
                                                    onclick="initRegistrationMode('code')">
                                                    <i data-lucide="plus" class="w-3.5 h-3.5 mr-1"></i> 코드 등록
                                                </button>
                                                <button class="btn-xs btn-danger" id="btn-delete-codes"
                                                    onclick="deleteSelectedCodes()" disabled>
                                                    <i data-lucide="trash-2" class="w-3.5 h-3.5 mr-1"></i> 코드 삭제
                                                </button>
                                            </div>
                                        </div>
                                        <div class="table-container flex-1">
                                            <table class="data-table">
                                                <thead>
                                                    <tr>
                                                        <th class="w-10 text-center">
                                                            <input type="checkbox" id="code-select-all"
                                                                class="custom-checkbox">
                                                        </th>
                                                        <th>코드 ID</th>
                                                        <th>코드 이름</th>
                                                        <th>설명</th>
                                                        <th class="text-center">사용 여부</th>
                                                        <th class="text-center">순서</th>
                                                        <th class="text-center">관리</th>
                                                    </tr>
                                                </thead>
                                                <tbody id="code-list-body" class="data-table-body">
                                                    <!-- JS Rendered -->
                                                </tbody>
                                            </table>
                                        </div>
                                        <div class="table-footer flex-none mt-auto pt-4 border-t border-slate-700/50">
                                            <span class="pagination-info" id="code-total-count">총 0 건</span>
                                        </div>
                                    </div>

                                    <!-- Reg Mode: Group Form -->
                                    <div id="reg-form-view">
                                        <!-- Keep existing group form fields -->
                                        <div class="grid grid-cols-3 gap-4">
                                            <div>
                                                <label class="form-label">코드 그룹 ID <span id="reg-group-id-required"
                                                        class="text-error">*</span></label>
                                                <input type="text" id="reg-group-id" class="form-input"
                                                    placeholder="코드 그룹 ID (영문 대문자, 숫자, 언더바)"
                                                    oninput="resetError('reg-group-id')">
                                                <div id="error-reg-group-id" class="form-error"></div>
                                            </div>
                                            <div>
                                                <label class="form-label">코드 그룹 이름 <span
                                                        class="text-error">*</span></label>
                                                <input type="text" id="reg-group-name" class="form-input"
                                                    placeholder="코드 그룹 이름" oninput="resetError('reg-group-name')">
                                                <div id="error-reg-group-name" class="form-error"></div>
                                            </div>
                                            <div>
                                                <label class="form-label">사용 여부 <span
                                                        class="text-error">*</span></label>
                                                <select id="reg-group-status" class="form-input form-select">
                                                    <option value="사용">사용</option>
                                                    <option value="미사용">미사용</option>
                                                </select>
                                            </div>
                                            <div class="col-span-3">
                                                <label class="form-label">설명</label>
                                                <textarea id="reg-group-desc" class="form-input h-24 resize-none"
                                                    placeholder="코드 그룹에 대한 설명을 입력해 주세요."></textarea>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Reg Mode: Code Form -->
                                    <div id="reg-code-form-view" class="hidden registration-form-panel">
                                        <div class="grid grid-cols-2 gap-4">
                                            <div>
                                                <label class="form-label">코드 ID <span id="reg-code-id-required"
                                                        class="text-error">*</span></label>
                                                <input type="text" id="reg-code-id" class="form-input"
                                                    placeholder="코드 ID 입력" oninput="resetError('reg-code-id')">
                                                <div id="error-reg-code-id" class="form-error"></div>
                                            </div>
                                            <div>
                                                <label class="form-label">코드 이름 <span
                                                        class="text-error">*</span></label>
                                                <input type="text" id="reg-code-name" class="form-input"
                                                    placeholder="코드 이름 입력" oninput="resetError('reg-code-name')">
                                                <div id="error-reg-code-name" class="form-error"></div>
                                            </div>
                                            <div>
                                                <label class="form-label">사용 여부 <span
                                                        class="text-error">*</span></label>
                                                <select id="reg-code-status" class="form-input form-select">
                                                    <option value="사용">사용</option>
                                                    <option value="미사용">미사용</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label class="form-label">순서</label>
                                                <input type="number" id="reg-code-sort" class="form-input" value="10">
                                            </div>
                                            <div class="col-span-2">
                                                <label class="form-label">설명</label>
                                                <textarea id="reg-code-desc" class="form-input h-24 resize-none"
                                                    placeholder="코드에 대한 설명을 입력하세요."></textarea>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div> <!-- End of split-container -->
                </div>
            </div>
        </main>
    </div>

    <!-- System Switcher Modal -->
    <div data-include="../components/system-switcher.html"></div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-dialog">
            <div class="modal-icon info">
                <i data-lucide="help-circle" width="64" height="64" class="text-icon-info"></i>
            </div>
            <h3 class="modal-title" id="confirm-modal-title">코드 그룹 등록</h3>
            <p class="modal-desc" id="confirm-modal-desc">입력하신 정보로 코드 그룹을 등록하시겠습니까?</p>
            <div class="modal-btn-group">
                <button onclick="closeConfirmModal()" class="btn-flex btn-modal-secondary">취소</button>
                <button onclick="confirmSaveRegistration()" class="btn-flex btn-modal-primary">확인</button>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="modal-overlay">
        <div class="modal-dialog">
            <div class="modal-icon success">
                <i data-lucide="check-circle-2" width="64" height="64" class="text-icon-success"></i>
            </div>
            <h3 class="modal-title" id="success-modal-title">등록 완료</h3>
            <p id="success-message" class="modal-desc">코드 그룹 등록이 완료되었습니다.</p>
            <div class="modal-btn-group">
                <button onclick="closeSuccessModal()" class="btn-modal-success">확인</button>
            </div>
        </div>
    </div>

    <script src="../js/include.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/SAM_SY_01_01.js"></script>
</body>

</html>
